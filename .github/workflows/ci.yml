name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

# The toolchain (channel + rustfmt/clippy components) comes from
# rust-toolchain.toml, which rustup auto-installs on the first cargo call.
# rust-htslib (a dev-dependency, Unix-only) builds bundled HTSlib from C, so the
# jobs that compile test/dev targets install a C toolchain + compression libs.
jobs:
  commit-message:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate commit messages
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = pull_request ]; then
            base=$PR_BASE_SHA
            head=$PR_HEAD_SHA
          else
            base=$PUSH_BEFORE_SHA
            head=$PUSH_HEAD_SHA
          fi

          # Skip merge commits: their default "Merge ..." subjects are not
          # Conventional Commits, and the real work lands in their parents,
          # which are validated on their own.
          zero=0000000000000000000000000000000000000000
          if [ -n "$base" ] && [ "$base" != "$zero" ] && git cat-file -e "$base^{commit}" 2>/dev/null; then
            commits=$(git rev-list --no-merges --reverse "$base..$head")
          elif [ "$(git rev-list --no-walk --count --merges "$head")" = 0 ]; then
            commits=$head
          else
            commits=
          fi

          status=0
          for commit in $commits; do
            message_file="$RUNNER_TEMP/commit-message-$commit"
            git show -s --format=%B "$commit" > "$message_file"
            if ! scripts/validate-commit-message.sh "$message_file"; then
              printf 'Commit %s has an invalid message.\n' "$commit" >&2
              status=1
            fi
          done
          exit "$status"

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install HTSlib build deps
        run: sudo apt-get update && sudo apt-get install -y
             build-essential autoconf automake zlib1g-dev libbz2-dev
             liblzma-dev libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install HTSlib build deps
        run: sudo apt-get update && sudo apt-get install -y
             build-essential autoconf automake zlib1g-dev libbz2-dev
             liblzma-dev libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features --locked

  # Verifies the crate still builds on its declared MSRV (Cargo.toml
  # `rust-version`). RUSTUP_TOOLCHAIN overrides the pinned rust-toolchain.toml.
  msrv:
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: "1.91.0"
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install 1.91.0 --profile minimal
      - name: Install HTSlib build deps
        run: sudo apt-get update && sudo apt-get install -y
             build-essential autoconf automake zlib1g-dev libbz2-dev
             liblzma-dev libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features --locked

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
