name: Release

on:
  push:
    # Bare version tags, e.g. 0.1.0 or 0.1.0-rc1 — no "v" prefix.
    tags: ["[0-9]+.[0-9]+.[0-9]+", "[0-9]+.[0-9]+.[0-9]+-*"]
  workflow_dispatch: # manual runs build + checksum every target without publishing

permissions:
  contents: write # attach binaries to the GitHub Release

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-latest }
          - { target: x86_64-apple-darwin, os: macos-13 }
          - { target: aarch64-apple-darwin, os: macos-14 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Linux: install the cross C toolchain + Rust target. This covers the
      # aarch64 cross-compile and both musl targets, using native cross GCCs on
      # the runner (cmake is present there for the zlib-ng C build) rather than
      # a container. sassy's SIMD still resolves per arch: x86_64 gets AVX2 via
      # .cargo/config.toml, aarch64 uses baseline NEON.
      - uses: taiki-e/setup-cross-toolchain-action@v1
        if: runner.os == 'Linux'
        with:
          target: ${{ matrix.target }}

      # macOS: native build, just add the Rust target for the active toolchain.
      - name: Add Rust target (macOS)
        if: runner.os == 'macOS'
        env:
          TARGET: ${{ matrix.target }}
        run: rustup target add "$TARGET"

      - uses: Swatinem/rust-cache@v2

      - name: Build
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --locked --target "$TARGET"

      - name: Package
        id: pkg
        env:
          TARGET: ${{ matrix.target }}
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          name="whittle-${version}-${TARGET}"
          tar -C "target/${TARGET}/release" -czf "${name}.tar.gz" whittle
          shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.pkg.outputs.name }}
          path: ${{ steps.pkg.outputs.name }}.tar.gz*

      - name: Attach to release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg.outputs.name }}.tar.gz
            ${{ steps.pkg.outputs.name }}.tar.gz.sha256
